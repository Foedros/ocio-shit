name: Deploy PWA to GitHub Pages

# Builds the SvelteKit PWA to static and publishes it to GitHub Pages (the stable web
# origin required by tecnico.md / roadmap.md). NO personal data is built or published:
# the app shell only. The archive is loaded locally from the user's durable directory.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: app

jobs:
  # The durability column must be proven before anything ships.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Unit (round-trip + atomic write) + E2E (OPFS loss -> reconstruct)
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Enable GitHub Pages (source = GitHub Actions)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build (base path = /<repo>)
        run: npm run build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
