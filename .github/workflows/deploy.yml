name: Deploy PWA to GitHub Pages

# Builds the SvelteKit PWA to static and publishes it to GitHub Pages (the stable web origin
# required by tecnico.md / roadmap.md). NO personal data is built or published: the app shell
# only. The data lives in Supabase (Postgres) behind RLS; the build bakes ONLY the PUBLIC_*
# Supabase values (URL + publishable key, public by design) — the secret is never in CI/bundle.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: app

jobs:
  # Conserved Node tests (deterministic, no creds): io round-trip, alta/borrado/filtros,
  # compiler, colecciones, dialect adapter. The Supabase E2E + verify scripts run LOCALLY
  # (they need live credentials and hit the real project), not in CI.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Unit (io round-trip · queries · compiler · colecciones · pg-dialect)
        run: npm run test:unit

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Enable GitHub Pages (source = GitHub Actions)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build (base path = /<repo>)
        run: npm run build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
          # PUBLIC_* = públicas por diseño (van al bundle del cliente). La SECRET NUNCA aquí.
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
